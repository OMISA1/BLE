<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OMISA</title>
<style>
  :root { --deep:#04342C; --primary:#0F6E56; --accent:#1D9E75; --surface:#E1F5EE; --light:#9FE1CB; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; margin:0; background:#f4f6f8; color:#222; }
  .hdr { background:var(--primary); color:#fff; padding:10px 12px; }
  .hdr h1 { margin:0; font-size:18px; letter-spacing:2px; }
  .hdr .s { font-size:10px; opacity:.85; }
  .nav { background:var(--accent); display:flex; overflow-x:auto; }
  .nav a { color:#fff; text-decoration:none; padding:9px 12px; font-size:12px; white-space:nowrap; cursor:pointer; }
  .nav a.on { background:var(--primary); font-weight:bold; }
  .wrap { padding:12px; max-width:640px; margin:0 auto; }
  .banner { padding:14px; border-radius:8px; color:#fff; font-size:20px; font-weight:bold; text-align:center; margin-bottom:12px; }
  .card { background:#fff; padding:12px; border-radius:6px; margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; background:#fff; font-size:12px; margin-bottom:10px; }
  th { background:var(--primary); color:#fff; padding:6px; text-align:left; }
  td { padding:6px; border-bottom:1px solid #eee; vertical-align:middle; }
  .bar { background:#ddd; border-radius:3px; height:8px; width:55px; display:inline-block; }
  .fill { height:8px; border-radius:3px; }
  .tag { font-size:9px; padding:2px 5px; border-radius:3px; color:#fff; }
  .why { font-size:10px; color:#888; font-style:italic; }
  .sub { font-size:11px; color:#666; margin:6px 0 12px; }
  .f { color:#c0392b; font-weight:bold; }
  button { padding:11px 18px; background:var(--primary); color:#fff; border:0; border-radius:5px; font-size:15px; cursor:pointer; }
  .warn { background:#fff8e1; border-left:4px solid #f39c12; padding:10px; font-size:12px; margin-bottom:12px; }
  .info { background:var(--surface); border-left:4px solid var(--accent); padding:10px; font-size:12px; margin-bottom:12px; }
  h3 { font-size:14px; margin:0 0 6px; color:var(--primary); }
  h4 { font-size:13px; margin:12px 0 4px; color:var(--deep); }
  ol { margin:6px 0 6px 18px; padding:0; }
  li { margin-bottom:4px; font-size:12px; }
  .hide { display:none; }
</style>
</head>
<body>

<div class="hdr">
  <h1>OMISA</h1>
  <div class="s">Open Modular Interchangeable Sensor Architecture <span id="up"></span></div>
</div>
<div class="nav" id="nav"></div>
<div class="wrap" id="main"></div>

<script>
const SERVICE_UUID = '6f1a0001-b5a3-f393-e0a9-e50e24dcca9e';
const CHAR_UUID    = '6f1a0002-b5a3-f393-e0a9-e50e24dcca9e';
const PAGES = ['Status','Trend','History','Connectivity','About'];

let device=null, ch=null, poll=null, D=null, page='Status', connected=false;
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));

function fmtTime(s){
  s = s|0;
  if (s < 3600) return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  return Math.floor(s/3600)+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function drawNav(){
  $('nav').innerHTML = PAGES.map(p =>
    `<a class="${p===page?'on':''}" onclick="go('${p}')">${p}</a>`).join('');
}
function go(p){ page=p; drawNav(); render(); }

function bannerHTML(){
  const cols=['#27ae60','#f39c12','#c0392b'], names=['SAFE','CAUTION','HIGH ALERT'];
  const a=D.alert|0;
  let t=names[a]||'SAFE';
  if (D.gasConf>=0 && D.gasConf<D.conf && a>0) t+="<br><span style='font-size:11px'>UNCONFIRMED — not corroborated</span>";
  return `<div class="banner" style="background:${cols[a]||cols[0]}">${t}</div>`;
}
function statusHTML(){
  let h = bannerHTML();
  h += '<table><tr><th>Module</th><th>Class</th><th>Reading</th><th>Trust</th></tr>';
  (D.mods||[]).forEach(m=>{
    const tc = m.t>=D.conf ? '#27ae60' : '#f39c12';
    const cc = m.c==='native' ? '#8e44ad' : '#16a085';
    const rd = m.r==='FAULT' ? "<span class='f'>FAULT</span>" : `<b>${esc(m.r)}</b>`;
    h += `<tr><td><b>${esc(m.m)}</b><div class="why">${esc(m.f)}</div></td>
      <td><span class="tag" style="background:${cc}">${esc(m.c)}</span></td>
      <td>${rd}</td>
      <td><div class="bar"><div class="fill" style="width:${m.t*55/100}px;background:${tc}"></div></div> ${m.t}%
      <div class="why">${esc(m.w)}</div></td></tr>`;
  });
  h += '</table>';
  h += `<div class="card"><b>Active modules: ${(D.mods||[]).length}</b>`;
  if (D.gasConf>=0) h += `<br>Combined gas confidence: <b>${D.gasConf}%</b><div class="why">${esc(D.gasWhy)}</div>`;
  h += '</div>';
  return h;
}
function graphHTML(m){
  const n=(m.h||[]).length;
  if (n<2) return `<div class="sub">${esc(m.m)}: collecting data…</div>`;
  const mx = Math.max(1, ...m.h);
  const span = m.span|0;
  let pts='';
  m.h.forEach((v,k)=>{ pts += (34 + k*280/Math.max(1,n-1)) + ',' + (86 - v*80/mx) + ' '; });
  return `<div class="card"><b>${esc(m.m)}</b> <span class="why">reading vs time</span>
    <svg viewBox="0 0 320 110" style="width:100%;height:110px">
      <line x1="34" y1="6" x2="34" y2="86" stroke="#999"/>
      <line x1="34" y1="86" x2="314" y2="86" stroke="#999"/>
      <text x="2" y="12" font-size="9" fill="#666">${mx}</text>
      <text x="2" y="52" font-size="9" fill="#666">${Math.round(mx/2)}</text>
      <text x="2" y="90" font-size="9" fill="#666">0</text>
      <text x="30" y="102" font-size="9" fill="#666">-${span}s</text>
      <text x="292" y="102" font-size="9" fill="#666">now</text>
      <polyline fill="none" stroke="#0F6E56" stroke-width="2" points="${pts}"/>
    </svg>
    <div class="why">${n} samples over ${span}s | peak ${mx} | now ${esc(m.r)}</div></div>`;
}
function trendHTML(){
  const gas=(D.mods||[]).filter(m=>/gas/i.test(m.f));
  const other=(D.mods||[]).filter(m=>!/gas/i.test(m.f) && (m.h||[]).length>1);
  let h='';
  h += gas.length ? gas.map(graphHTML).join('') : '<div class="card">No gas sensors connected.</div>';
  h += other.map(graphHTML).join('');
  return h;
}
function historyHTML(){
  let h='<table><tr><th>Time</th><th>Event</th></tr>';
  (D.log||[]).forEach(e=>{ h += `<tr><td>${fmtTime(e.t)}</td><td>${esc(e.e)}</td></tr>`; });
  h += '</table><div class="sub">Times are since power-on. No real-time clock is fitted, so OMISA cannot know the date. Dated long-term logging needs an RTC and SD card module.</div>';
  return h;
}
function connectivityHTML(){
  const ble = !!navigator.bluetooth;
  return `<div class="card"><h3>Connectivity</h3>
    <div class="why">OMISA runs both interfaces at the same time. Use whichever suits your device.</div>

    <h4>Bluetooth</h4>
    ${ble
      ? `<div class="info">Your phone keeps its normal WiFi and internet. OMISA connects over Bluetooth only — no network details are shared.<br><br>
         <b>Status:</b> ${connected?'connected':'not connected'}</div>
         ${connected?'<button onclick="disconnect()">Disconnect</button>':'<button onclick="connect()">Connect to OMISA</button>'}`
      : `<div class="warn"><b>This browser cannot use Bluetooth.</b><br>Web Bluetooth works in Chrome on Android and desktop Chrome. It is not available on iPhone or iPad, or in Safari and Firefox. Use the WiFi route below.</div>`}

    <h4>WiFi</h4>
    <div class="info">Works on every device, including iPhone. Your phone joins OMISA's own network, so it has no internet while connected.</div>
    <ol>
      <li>Open your WiFi settings and join the network <b>OMISA</b> (password <b>omisa1234</b>).</li>
      <li>Open a browser and go to <b>http://omisa.local</b> — or <b>http://192.168.4.1</b> if that does not load.</li>
      <li>If your phone warns the network has no internet, choose to stay connected.</li>
    </ol>
    <div class="why">Both routes show the same live data.</div>
    </div>`;
}
function aboutHTML(){
  return `<div class="card"><b>OMISA</b><br><span class="why">Open Modular Interchangeable Sensor Architecture</span><br><br>
    Modules describe themselves at runtime. The platform holds no built-in knowledge of any sensor — each module declares its own model, function, reading and alert thresholds.<br><br>
    <span class="tag" style="background:#16a085">bridge</span> a microcontroller hosts a non-bus sensor and translates it.<br>
    <span class="tag" style="background:#8e44ad">native</span> the sensor speaks the bus directly and identifies itself.<br><br>
    <b>Trust</b> starts at 50% and rises with stable readings, falling on instability or fault. Two gas sensors corroborate each other.
    Alerts under ${D&&D.conf?D.conf:65}% are shown but marked UNCONFIRMED — never suppressed.</div>`;
}

function render(){
  $('up').textContent = D ? ('| running '+fmtTime(D.uptime)) : '';
  if (page==='Connectivity'){ $('main').innerHTML = connectivityHTML(); return; }
  if (!D){
    $('main').innerHTML = `<div class="card"><h3>Not connected</h3>
      <div class="why">Go to Connectivity to connect over Bluetooth, or join OMISA's WiFi network.</div><br>
      <button onclick="go('Connectivity')">Connectivity options</button></div>`;
    return;
  }
  if (page==='Status')  $('main').innerHTML = statusHTML();
  if (page==='Trend')   $('main').innerHTML = trendHTML();
  if (page==='History') $('main').innerHTML = historyHTML();
  if (page==='About')   $('main').innerHTML = aboutHTML();
}

async function readOnce(){
  if (!ch) return;
  try {
    const v = await ch.readValue();
    const txt = new TextDecoder().decode(v);
    D = JSON.parse(txt);
    render();
  } catch(e){ console.log('read failed', e); }
}
async function connect(){
  try {
    device = await navigator.bluetooth.requestDevice({
      filters:[{ name:'OMISA' }], optionalServices:[SERVICE_UUID] });
    device.addEventListener('gattserverdisconnected', ()=>{
      connected=false; D=null; if(poll) clearInterval(poll); render(); });
    const srv = await device.gatt.connect();
    const svc = await srv.getPrimaryService(SERVICE_UUID);
    ch = await svc.getCharacteristic(CHAR_UUID);
    connected = true;
    await readOnce();
    if (poll) clearInterval(poll);
    poll = setInterval(readOnce, 3000);
    go('Status');
  } catch(e){ alert('Could not connect: '+e.message); }
}
function disconnect(){
  if (poll) clearInterval(poll);
  if (device && device.gatt.connected) device.gatt.disconnect();
  connected=false; D=null; render();
}

drawNav(); render();
</script>
</body>
</html>
